<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Fotos Produccion</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<nav>
    <span class="logo">Gestión Empresa</span>
    <a href="/">Equipos</a>
    <a href="/obrador">Obrador</a>
    <a href="/produccion">Produccion</a>
    <a href="/resumen">Resumen</a>
    <a href="/fotos">Fotos</a>
    <a href="/ayuda">Ayuda</a>
</nav>
    <div class="contenido">
        <h1>Fotos de Produccion</h1>

        <table>
            <tr>
                <th>Fecha</th>
                <th>Tienda</th>
                <th>Ver foto</th>
            </tr>
            {% for r in respuestas %}
            <tr>
                <td>{{ r["Fecha de producción"] }}</td>
                <td>{{ r["Tienda"] }}</td>
                <td><a href="{{ r["Foto de la hoja"] }}" target="_blank">📸 Ver foto</a></td>
            </tr>
            {% endfor %}
        </table>
    </div>
</body>
</html>
